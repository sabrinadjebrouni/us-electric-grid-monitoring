eia_project:
  outputs:
    dev:
      dataset: "{{ env_var('GCP_DATASET') }}"
      job_execution_timeout_seconds: 300
      job_retries: 1
      keyfile: /root/key.json 
      location: US
      method: service-account
      priority: interactive
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      threads: 1
      type: bigquery
  target: dev
